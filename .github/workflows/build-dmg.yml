name: Build DMG

# Builds a universal Tokenholic.app, packages a DMG, and (when signing secrets
# are present) Developer-ID-signs + notarizes + staples it.
#
# Works with NO secrets: produces an ad-hoc-signed DMG artifact (runs locally,
# but other Macs get a Gatekeeper warning). Add the secrets below to get a
# notarized, distributable DMG — nothing else changes.
#
# Optional secrets (Settings → Secrets and variables → Actions):
#   MACOS_CERTIFICATE       base64 of your "Developer ID Application" .p12
#                           (base64 -i cert.p12 | pbcopy)
#   MACOS_CERTIFICATE_PWD   the .p12 export password
#   KEYCHAIN_PASSWORD       any throwaway string for the temp CI keychain
#   # notarization (App Store Connect API key):
#   AC_API_KEY              contents of the AuthKey_XXXXXXXXXX.p8 file
#   AC_API_KEY_ID           the key id (the XXXXXXXXXX in the filename)
#   AC_API_ISSUER_ID        the App Store Connect issuer id (a UUID)
# The Developer ID signing identity is auto-detected from the imported cert.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # to attach the DMG to a GitHub Release on tags

jobs:
  build-dmg:
    runs-on: macos-15
    env:
      APP_NAME: Tokenholic
      BUNDLE_ID: ai.conol.Tokenholic
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: swift --version && xcodebuild -version

      - name: Compute version
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            BASE="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' App/Info.plist)"
            V="${BASE}+$(echo "$GITHUB_SHA" | cut -c1-7)"
          fi
          echo "VERSION=$V" >> "$GITHUB_ENV"
          echo "Building version $V"

      - name: Build (release, arm64)
        # Native build on the arm64 runner. A universal `--arch arm64 --arch
        # x86_64` build hits a swiftLanguageMode→SWIFT_VERSION bug in the
        # runner's Swift 6.1 xcbuild path; revisit for Intel/universal support.
        run: swift build -c release

      - name: Assemble .app bundle
        run: |
          set -euo pipefail
          BIN=".build/apple/Products/Release/$APP_NAME"
          [ -f "$BIN" ] || BIN=".build/release/$APP_NAME"
          file "$BIN"
          APP="$APP_NAME.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$BIN" "$APP/Contents/MacOS/$APP_NAME"
          cp App/Info.plist "$APP/Contents/Info.plist"
          if [ -d App/AppIcon.iconset ]; then
            iconutil -c icns App/AppIcon.iconset -o "$APP/Contents/Resources/AppIcon.icns"
          fi
          printf 'APPL????' > "$APP/Contents/PkgInfo"

      - name: Sign app (Developer ID if configured, else ad-hoc)
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          APP="$APP_NAME.app"
          if [ -z "${MACOS_CERTIFICATE:-}" ]; then
            echo "::notice::No Developer ID certificate — ad-hoc signing. DMG will trip Gatekeeper on other Macs."
            codesign --force --deep --sign - --identifier "$BUNDLE_ID" "$APP"
            exit 0
          fi
          KP="${KEYCHAIN_PASSWORD:-ci-$RANDOM}"
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KP" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "${MACOS_CERTIFICATE_PWD:-}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"
          # Auto-detect the Developer ID Application identity from the imported cert.
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk -F'"' '/Developer ID Application/{print $2; exit}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity found in the certificate."; exit 1
          fi
          echo "Signing with: $IDENTITY"
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          codesign --force --options runtime --timestamp \
            --sign "$IDENTITY" --identifier "$BUNDLE_ID" "$APP"
          codesign --verify --strict --verbose=2 "$APP"

      - name: Create DMG
        run: |
          set -euo pipefail
          STAGING="$RUNNER_TEMP/dmg"
          rm -rf "$STAGING"; mkdir -p "$STAGING"
          cp -R "$APP_NAME.app" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          DMG="$APP_NAME-$VERSION.dmg"
          hdiutil create -volname "$APP_NAME" -srcfolder "$STAGING" -ov -format UDZO "$DMG"
          echo "DMG=$DMG" >> "$GITHUB_ENV"
          echo "Created $DMG"

      - name: Notarize & staple (if configured)
        # Non-fatal: if Apple's notary is slow/down, still ship the signed
        # (un-stapled) DMG rather than hanging or failing the whole build.
        continue-on-error: true
        env:
          AC_API_KEY: ${{ secrets.AC_API_KEY }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          if [ -z "${AC_API_KEY:-}" ] || [ -z "${SIGN_IDENTITY:-}" ]; then
            echo "::warning::Notarization key / signing identity not set — DMG built but NOT notarized; users will see a Gatekeeper warning."
            exit 0
          fi
          # Sign the DMG with the same Developer ID identity used for the app.
          codesign --force --sign "$SIGN_IDENTITY" --timestamp "$DMG"
          KEY="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$AC_API_KEY" > "$KEY"
          xcrun notarytool submit "$DMG" \
            --key "$KEY" --key-id "$AC_API_KEY_ID" --issuer "$AC_API_ISSUER_ID" \
            --wait --timeout 30m
          rm -f "$KEY"
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION }}
          path: ${{ env.DMG }}
          if-no-files-found: error

      - name: Attach DMG to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG }}
          generate_release_notes: true
